# -*- conf -*-
# TokyoNight Night
# upstream: https://github.com/folke/tokyonight.nvim
#
# Colors sourced from the official TokyoNight palette (styles.lua "night").
# foot 1.27 uses [colors-dark]/[colors-light] sections; the legacy [colors]
# section and the [cursor] color= key are no longer honored, which is why the
# older version of this theme did not apply.

[colors-dark]
foreground=c0caf5
background=1a1b26

# cursor: text bg / cursor bg (reversed fg/bg, matching foot's default)
cursor=1a1b26 c0caf5

# selection: fg / bg (from tokyonight "night" selection hl group)
selection-foreground=c0caf5
selection-background=283457

# 16 ANSI colors (black, red, green, yellow, blue, magenta, cyan, white)
regular0=15161e
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=a9b1d6

bright0=414868
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=c0caf5

# Extended palette slots used by tokyonight (orange, git danger red)
16=ff9e64
17=db4b4b

# URL underline color (tokyonight "gitSigns.add" / hint green-ish)
urls=73daca
