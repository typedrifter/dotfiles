---
# shared variables for all machines.
# per-host overrides (e.g. variant) live in host_vars/<hostname>.yml.

# stow -- one package per app dir, kept at repo root.
stow_target: "{{ lookup('env', 'HOME') }}"
stow_src: "{{ playbook_dir }}/../"   # repo root
stow_packages_base:
  - foot
  - lf
  - nvim
  - tmux
  - zsh
  - scripts
  - mango
  - waybar

# per-host config symlinks created before stow runs.
# src lives next to dest inside the stow package.
variant_links:
  - { app: foot,   src: foot,   dest: foot.local.ini, ext: ini }
  - { app: waybar, src: config, dest: config.jsonc,    ext: jsonc }

# package lists -- populate as you go. packages role no-ops when empty.
pacman_packages_base:
  - bitwarden-cli
yay_packages_base: []
