---
# Entry point for both `ansible-playbook` and `ansible-pull`.
#
# Targets implicit localhost (local connection) and loads the matching
# host_vars/<ansible_hostname>.yml so each machine gets its own waybar variant.
#
# Execution order is deliberate:
#   1. packages  -- install system/AUR pkgs (idempotent, skips when lists empty)
#   2. waybar    -- create config.jsonc -> config.<variant>.jsonc symlink IN REPO
#                   (must run before stow so the link is stowed into ~/.config/)
#   3. foot      -- create foot.local.ini -> foot.<variant>.ini symlink IN REPO
#                   (must run before stow, same reason as waybar)
#   4. stow      -- restow all packages into $HOME

- hosts: localhost
  connection: local
  vars_files:
    - group_vars/all.yml
  pre_tasks:
    - name: load host-specific variables for {{ ansible_facts['hostname'] }}
      ansible.builtin.include_vars:
        dir: host_vars
        files_matching: "{{ ansible_facts['hostname'] }}.yml"
        ignore_unknown_extensions: true
        depth: 1
  roles:
    - packages
    - waybar
    - foot
    - stow
