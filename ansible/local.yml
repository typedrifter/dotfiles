---
# Entry point for both `ansible-playbook` and `ansible-pull`.
#
# Targets implicit localhost (local connection) and loads the matching
# host_vars/<ansible_hostname>.yml so each machine gets its own variant.
#
# Execution order is deliberate:
#   0. git pull --ff-only -- fast-forward to upstream before anything else;
#      aborts the play on divergence/network failure so the system stays in
#      its pre-existing state. Must run before include_vars so host_vars
#      reflect the just-pulled version.
#   1. packages        -- install system/AUR pkgs (idempotent, skips when empty)
#   2. variant-config  -- create per-variant config symlinks IN REPO
#                         (foot.local.ini, waybar config.jsonc; must run before
#                         stow so the links are stowed into ~/.config/)
#   3. stow            -- restow all packages into $HOME

- hosts: localhost
  connection: local
  vars_files:
    - group_vars/all.yml
  pre_tasks:
    - name: git pull latest changes
      ansible.builtin.command: "git -C {{ playbook_dir | dirname }} pull --ff-only"
      register: _dotfiles_pull
      changed_when: "'Updating' in _dotfiles_pull.stdout or 'Fast-forward' in _dotfiles_pull.stdout"
      run_once: true

    - name: load host-specific variables for {{ ansible_facts['hostname'] }}
      ansible.builtin.include_vars:
        dir: host_vars
        files_matching: "{{ ansible_facts['hostname'] }}.yml"
        ignore_unknown_extensions: true
        depth: 1
  roles:
    - packages
    - variant-config
    - stow
