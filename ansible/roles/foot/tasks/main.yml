---
# Creates foot.local.ini -> foot.<foot_variant>.ini INSIDE the repo, before
# stow runs. After stow, ~/.config/foot/foot.local.ini resolves through to the
# host variant file in the repo (edit there, edits propagate via stow).
# foot.local.ini itself is gitignored (runtime, host-specific data).
# Mirrors the waybar role's per-variant symlink pattern.

- name: link host-specific foot.local.ini -> foot.{{ foot_variant }}.ini
  ansible.builtin.file:
    src: "foot.{{ foot_variant }}.ini"
    dest: "{{ stow_src }}foot/.config/foot/foot.local.ini"
    state: link
    force: true
