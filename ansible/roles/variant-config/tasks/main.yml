---
# Creates host-local config symlinks INSIDE the repo, before stow runs. After
# stow, ~/.config/<app>/<local> resolves through to the host variant file in the
# repo (edit there, edits propagate via stow). The local symlink targets are
# gitignored -- they are runtime, host-specific data.
#
# Hosts set `variant` in host_vars/<hostname>.yml (e.g. `variant: laptop`).
# Extend the loop below with { app, src, dest, ext } when a new app needs a
# per-variant override. Must run before `stow` so the links are stowed out.

- name: link host-specific variant configs
  ansible.builtin.file:
    src: "{{ item.src }}.{{ variant }}.{{ item.ext }}"
    dest: "{{ stow_src }}{{ item.app }}/.config/{{ item.app }}/{{ item.dest }}"
    state: link
    force: true
  loop:
    - { app: foot,   src: foot,   dest: foot.local.ini, ext: ini }
    - { app: waybar, src: config, dest: config.jsonc,    ext: jsonc }
