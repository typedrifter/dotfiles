---
# Two managed machines. Each runs ansible-playbook / ansible-pull locally.
# Host-specific vars live in host_vars/<hostname>.yml and are loaded by the
# load-host-vars role via ansible_hostname (the OS fact). This inventory file is
# therefore documentation and future-SSH-ready, but not strictly required for a
# local apply.

all:
  hosts:
    flc-thinkpad:
      ansible_connection: local
    francois-desktop-linux:
      ansible_connection: local
