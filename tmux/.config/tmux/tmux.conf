bind r source-file ~/.config/tmux/tmux.conf

# Undercurl
# set -g default-terminal "${TERM}"
# set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
# set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
#
# set-environment -g COLORTERM "truecolor"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",$TERM:RGB"

set -g prefix C-s

set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# bind-key -r f run-shell "tmux neww ~/.local/bin/fzf-project"
bind-key -r f  display-popup -E "~/.local/bin/fzf-project"
# bind-key -n  M-t select-pane -U \;  resize-pane -Z
bind-key -n M-t run-shell "~/.config/tmux/toggle-terminal.sh"
bind-key -T copy-mode-vi M-t run-shell "~/.config/tmux/toggle-terminal.sh"

bind-key -n M-O run-shell "~/.config/tmux/toggle-opencode.sh"
bind-key -T copy-mode-vi M-O run-shell "~/.config/tmux/toggle-opencode.sh"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'

# Put status on top
set -g status-position top

# Vim navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


bind w kill-session

bind -n M-h  previous-window
bind -n M-l next-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

# Theme: TokyoNight Night
source-file "$HOME/.config/tmux/themes/tokyonight_night.tmux"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
